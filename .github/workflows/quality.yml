name: Quality

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CI: 'true'

jobs:
  quality:
    name: Types, lint, format, unit tests, and build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint -- --max-warnings 0
      - run: npm run format:check
      - run: npm run check:dead-code
      - run: npm run check:modules
      - run: npm test
      - run: npm run build
      - name: Upload unit failure report
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: unit-failure-report
          path: test-results/unit/
          if-no-files-found: ignore
          retention-days: 14

  coverage:
    name: Unit coverage
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run test:coverage
      - name: Upload coverage report
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          if-no-files-found: ignore
          retention-days: 14

  e2e:
    name: Browser journeys
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium webkit
      - run: npm run test:e2e
      - name: Upload browser failure artifacts
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: browser-failures
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 14

  visual:
    name: Curated visual regression
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:visual
      - name: Upload visual failure artifacts
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: visual-failures
          path: |
            playwright-report/visual/
            test-results/visual/
          if-no-files-found: ignore
          retention-days: 14

  broad-captures:
    name: Broad screenshot artifact
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run screenshots:capture
      - name: Upload broad captures
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: broad-studio-captures
          path: test-results/captures/
          if-no-files-found: ignore
          retention-days: 14
